<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Olva | Workspace</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#2563eb">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/localforage/1.10.0/localforage.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/fuse.js/dist/fuse.min.js"></script>
    <style>
        /* Hide scrollbar for a cleaner look but keep functionality */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-slate-50 h-screen flex overflow-hidden text-slate-800 antialiased font-sans">

    <div id="sidebar-overlay" class="fixed inset-0 bg-slate-900/50 z-40 hidden md:hidden transition-opacity backdrop-blur-sm" onclick="toggleSidebar()"></div>

    <aside id="sidebar" class="w-64 bg-white/90 backdrop-blur-xl border-r border-slate-200 flex flex-col fixed inset-y-0 left-0 z-50 transform -translate-x-full md:relative md:translate-x-0 transition-transform duration-300 ease-in-out shadow-2xl md:shadow-none">
        <div class="h-14 px-4 border-b border-slate-100 flex justify-between items-center bg-white">
            <h2 class="font-bold text-xl text-blue-600 tracking-tight">Olva.</h2>
            <button id="logout-btn" class="text-xs font-medium text-slate-400 hover:text-red-500 transition-colors">Logout</button>
        </div>
        
        <div class="p-4 flex-1 flex flex-col h-full overflow-hidden">
            <div class="flex items-center justify-between mb-4 flex-shrink-0">
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Your Vault</p>
                <button id="new-project-btn" class="text-slate-400 hover:text-blue-600 transition-colors tooltip" title="New Project">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                </button>
            </div>
            
            <div id="project-list" class="flex-1 overflow-y-auto no-scrollbar space-y-1">
                <div class="text-sm text-slate-500 italic px-2">Loading projects...</div>
            </div>
        </div>
    </aside>

    <main class="flex-1 flex flex-col h-full relative">
        
        <header class="h-14 bg-white/80 backdrop-blur-md border-b border-slate-200 flex items-center justify-between px-4 absolute top-0 w-full z-30">
            <div class="flex items-center gap-3">
                <button onclick="toggleSidebar()" class="md:hidden text-slate-500 hover:text-slate-800 focus:outline-none">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
                </button>
                <span class="text-sm font-semibold text-slate-700 truncate max-w-[120px] sm:max-w-xs" id="user-name">Loading...</span>
            </div>
            <div>
                <select id="model-select" class="text-xs sm:text-sm border border-slate-200 rounded-lg shadow-sm focus:border-blue-500 focus:ring-1 focus:ring-blue-500 bg-white px-3 py-1.5 outline-none cursor-pointer font-medium text-slate-600 appearance-none pr-8 relative">
                    <option value="llama-3.1-8b-instant">⚡ Llama 3.1 8B</option>
                    <option value="llama-3.3-70b-versatile">🧠 Llama 3.3 70B</option>
                </select>
            </div>
        </header>

        <div id="chat-box" class="flex-1 overflow-y-auto pt-20 pb-4 px-4 sm:px-6 md:px-10 space-y-6 no-scrollbar scroll-smooth">
            <div class="text-center text-slate-400 text-sm mt-10 font-medium">Start a conversation to begin studying.</div>
        </div>

        <div class="p-4 bg-gradient-to-t from-slate-50 via-slate-50 to-transparent">
            <div class="max-w-4xl mx-auto flex gap-2 relative bg-white border border-slate-200 rounded-2xl shadow-lg shadow-slate-200/50 p-1.5 transition-shadow focus-within:shadow-xl focus-within:border-blue-300">
                
                <input type="file" id="file-upload" accept=".txt,.md" class="hidden">
                
                <button id="upload-btn" class="text-slate-400 hover:text-blue-600 p-3 transition-colors flex-shrink-0 flex items-center justify-center tooltip" title="Upload Study Notes">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828l6.414-6.586a4 4 0 00-5.656-5.656l-6.415 6.585a6 6 0 108.486 8.486L20.5 13"></path></svg>
                </button>

                <textarea id="message-input" rows="1" placeholder="Ask Olva or upload a note..." class="flex-1 resize-none bg-transparent p-3 text-sm sm:text-base focus:outline-none no-scrollbar max-h-32"></textarea>
                
                <button id="send-btn" class="bg-blue-600 hover:bg-blue-700 text-white p-3 rounded-xl transition-all self-end flex-shrink-0 flex items-center justify-center">
                    <svg class="w-5 h-5 translate-x-[1px] translate-y-[-1px]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path></svg>
                </button>
            </div>
            <div id="upload-status" class="text-xs text-center text-green-600 font-medium mt-2 hidden">File chunked and saved to Vault!</div>
        </div>
    </main>

    <script>
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');
            sidebar.classList.toggle('-translate-x-full');
            overlay.classList.toggle('hidden');
        }
    </script>
    <script type="module" src="./js/app.js"></script>
</body>
</html>
